<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Document</title>
</head>
<body class="p-4">
  <div class="w-[200px] h-[80px] rounded bg-blue-300 mb-8"></div>

  <div class="flex gap-1 mb-2">
    <div class="relative size-[100px] bg-blue-100">
      <div class="size-[30px] bg-blue-300 absolute right-0 top-0"></div>
    </div>
    <div class="relative size-[100px] bg-blue-100">
      <div class="size-[30px] bg-blue-300 absolute right-0 bottom-0"></div>
    </div>
    <div class="relative size-[100px] bg-blue-100">
      <div class="size-[30px] bg-blue-300 absolute left-0 bottom-0"></div>
    </div>
    <div class="relative size-[100px] bg-blue-100">
      <div class="size-[30px] bg-blue-300 absolute left-2 top-[8px]"></div>
    </div>
  </div>

  <div class="relative size-[100px] bg-blue-100 mb-2">
    <div class="size-[30px] bg-blue-300 absolute right-[100%] top-0"></div>
  </div>
  <div class="relative size-[100px] bg-blue-100 m-2">
    <div class="size-[30px] bg-blue-300 absolute right-full top-0"></div>
  </div>
  <div class="relative size-[100px] bg-blue-100 m-2">
    <div class="size-[30px] bg-blue-300 absolute right-full top-0 !right-auto"></div>
  </div>

  <div class="flex gap-1 mb-2">
    <div class="relative size-[100px] bg-red-100">
      <div class="size-[30px] bg-red-300 absolute right-0 top-0"></div>
    </div>
    <div class="relative size-[100px] bg-red-100">
      <div class="size-[30px] bg-red-300 absolute right-1/3 top-0"></div>
    </div>
    <div class="relative size-[100px] bg-red-100">
      <div class="size-[30px] bg-red-300 absolute right-2/3 top-0"></div>
    </div>
  </div>
</body>
</html>
