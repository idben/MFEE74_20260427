<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>版型: 導覽列</title>
</head>
<body>
  <div class="container mx-auto p-2">
    <nav class="flex justify-between mb-[50px] items-center">
      <div class="brand flex  items-center">
        <div class="size-[30px] bg-sky-500 rounded"></div>
        <div>Brand</div>
      </div>
      <!-- <div class="option">2</div> -->
      <!-- ul.option>li*3>{選項$} -->
      <ul class="option hidden md:flex gap-[3px]">
        <li>
          <a class="text-stone-500 hover:text-sky-500 hover:font-bold" href="#">選項1</a>
        </li>
        <li>
          <a class="text-stone-500 hover:text-sky-500 hover:font-bold" href="#">選項2</a>
        </li>
        <li>
          <a class="text-stone-500 hover:text-sky-500 hover:font-bold" href="#">選項3</a>
        </li>
      </ul>

      <div class="btns hidden md:flex gap-2">
        <button class="bg-gray-500 text-white px-3 py-2 rounded hover:bg-gray-400 hover:cursor-pointer">登入</button>
        <button class="bg-gray-500 text-white px-3 py-2 rounded hover:bg-gray-400 hover:cursor-pointer">免費開始</button>
      </div>
    </nav>

    <nav class="flex mb-5">
      <div class="brand">1</div>
      <div class="option ml-auto">2</div>
      <div class="btns ml-auto">3</div>
    </nav>
  </div>

</body>
</html>
