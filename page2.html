<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>版型: 導覽列</title>
</head>
<body>
  <nav class="flex justify-between mb-[50px]">
    <div class="brand flex">
      <div class="size-[30px] bg-sky-500 rounded"></div>
      <div>Brand</div>
    </div>
    <!-- <div class="option">2</div> -->
    <!-- ul.option>li*3>{選項$} -->
    <ul class="option flex gap-[3px]">
      <li>
        <a class="text-stone-500 hover:text-sky-500 hover:font-bold" href="#">選項1</a>
      </li>
      <li>
        <a class="text-stone-500 hover:text-sky-500 hover:font-bold" href="#">選項2</a>
      </li>
      <li>
        <a class="text-stone-500 hover:text-sky-500 hover:font-bold" href="#">選項3</a>
      </li>
    </ul>
    <div class="btns">3</div>
  </nav>

  <nav class="flex mb-5">
    <div class="brand">1</div>
    <div class="option ml-auto">2</div>
    <div class="btns ml-auto">3</div>
  </nav>
</body>
</html>
