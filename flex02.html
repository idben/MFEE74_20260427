<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>flex 02</title>
</head>
<body class="p-4">
  <div class="bg-sky-100 p-1 flex gap-[2px] mb-2 justify-start">
    <div class="size-[60px] rounded bg-sky-300"></div>
    <div class="size-[60px] rounded bg-sky-400"></div>
    <div class="size-[60px] rounded bg-sky-500"></div>
    <div class="size-[60px] rounded bg-sky-600"></div>
    <div class="size-[60px] rounded bg-sky-700"></div>
    <div class="size-[60px] rounded bg-sky-800"></div>
  </div>

  <div class="bg-sky-100 p-1 flex gap-[2px] mb-2 justify-center">
    <div class="size-[60px] rounded bg-sky-300"></div>
    <div class="size-[60px] rounded bg-sky-400"></div>
    <div class="size-[60px] rounded bg-sky-500"></div>
    <div class="size-[60px] rounded bg-sky-600"></div>
    <div class="size-[60px] rounded bg-sky-700"></div>
    <div class="size-[60px] rounded bg-sky-800"></div>
  </div>

  <div class="bg-sky-100 p-1 flex gap-[2px] mb-2 justify-end">
    <div class="size-[60px] rounded bg-sky-300"></div>
    <div class="size-[60px] rounded bg-sky-400"></div>
    <div class="size-[60px] rounded bg-sky-500"></div>
    <div class="size-[60px] rounded bg-sky-600"></div>
    <div class="size-[60px] rounded bg-sky-700"></div>
    <div class="size-[60px] rounded bg-sky-800"></div>
  </div>
</body>
</html>
