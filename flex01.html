<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root{
      --gap1: 5px;
      --gap2: 10px;
    }
  </style>
  <title>flex01</title>
</head>
<body class="p-4">
  <div class="bg-sky-100 p-1 flex mb-2">
    <div class="size-[60px] rounded bg-sky-300"></div>
    <div class="size-[60px] rounded bg-sky-400"></div>
    <div class="size-[60px] rounded bg-sky-500"></div>
  </div>

  <div class="bg-sky-100 p-1 flex gap-[2px] mb-2">
    <div class="size-[60px] rounded bg-sky-300"></div>
    <div class="size-[60px] rounded bg-sky-400"></div>
    <div class="size-[60px] rounded bg-sky-500"></div>
  </div>

  <div class="bg-violet-100 p-1 flex gap-[2px] mb-2">
    <div class="size-[60px] rounded bg-violet-300 grid place-items-center">1</div>
    <div class="size-[60px] rounded bg-violet-400 grid place-items-center">2</div>
    <div class="size-[60px] rounded bg-violet-500 grid place-items-center">3</div>
  </div>

  <div class="bg-sky-100 p-1 flex gap-x-[2px] gap-y-[10px] mb-2 w-[200px] flex-wrap">
    <div class="size-[60px] rounded bg-sky-300"></div>
    <div class="size-[60px] rounded bg-sky-400"></div>
    <div class="size-[60px] rounded bg-sky-500"></div>
    <div class="size-[60px] rounded bg-sky-600"></div>
    <div class="size-[60px] rounded bg-sky-700"></div>
    <div class="size-[60px] rounded bg-sky-800"></div>
  </div>

  <div class="bg-sky-100 p-1 flex gap-x-(--gap2) gap-y-[var(--gap1)] mb-2 w-[200px] flex-wrap">
    <div class="size-[60px] rounded bg-sky-300"></div>
    <div class="size-[60px] rounded bg-sky-400"></div>
    <div class="size-[60px] rounded bg-sky-500"></div>
    <div class="size-[60px] rounded bg-sky-600"></div>
    <div class="size-[60px] rounded bg-sky-700"></div>
    <div class="size-[60px] rounded bg-sky-800"></div>
  </div>
</body>
</html>
